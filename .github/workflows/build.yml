name: Build FitTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          find . -maxdepth 1 \( -name "*.png" -o -name "*.jpg" -o -name "*.webp" -o -name "*.svg" \) ! -path "./.git/*" -exec cp {} www/ \; 2>/dev/null || true

      - name: Initialize Capacitor
        run: npx cap init FitTrack com.fittrack.app --web-dir www

      - name: Remove existing android folder if present
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Replace all app icons
        run: |
          if [ -f "icon.png" ]; then
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              case $density in
                mdpi)    size=48  ;;
                hdpi)    size=72  ;;
                xhdpi)   size=96  ;;
                xxhdpi)  size=144 ;;
                xxxhdpi) size=192 ;;
              esac
              dir="android/app/src/main/res/mipmap-${density}"
              mkdir -p "$dir"
              convert icon.png -resize ${size}x${size} "${dir}/ic_launcher.png"
              convert icon.png -resize ${size}x${size} "${dir}/ic_launcher_round.png"
              convert icon.png -resize ${size}x${size} "${dir}/ic_launcher_foreground.png"
            done
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@android:color/white"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            cp android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            echo "Icons replaced"
          fi

      - name: Update AndroidManifest permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <application|' "$MANIFEST"

      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Restore keystore from Secret
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > fittrack.keystore

      - name: Zipalign APK
        run: |
          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          $ZIPALIGN -v -p 4 android/app/build/outputs/apk/debug/app-debug.apk FitTrack-aligned.apk

      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -1)
          $APKSIGNER sign \
            --ks fittrack.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out FitTrack-v1.0.apk \
            FitTrack-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: FitTrack-APK
          path: FitTrack-v1.0.apk
          retention-days: 30

      - name: Show APK info
        run: du -sh FitTrack-v1.0.apk
