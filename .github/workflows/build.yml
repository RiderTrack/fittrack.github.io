name: Build FitTrack APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install imagemagick for icon resizing
        run: sudo apt-get install -y imagemagick

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          find . -maxdepth 1 \( -name "*.png" -o -name "*.jpg" -o -name "*.webp" -o -name "*.svg" \) ! -path "./.git/*" -exec cp {} www/ \; 2>/dev/null || true

      - name: Initialize Capacitor
        run: npx cap init FitTrack com.fittrack.app --web-dir www

      - name: Remove existing android folder if present
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Copy and resize app icon
        run: |
          if [ -f "icon.png" ]; then
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            convert icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            convert icon.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            convert icon.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            convert icon.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            echo "Iconos generados correctamente"
          else
            echo "icon.png no encontrado, usando icono por defecto"
          fi

      - name: Update AndroidManifest permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <application|' "$MANIFEST"

      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias fittrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass fittrack123 \
            -keypass fittrack123 \
            -dname "CN=FitTrack, OU=Dev, O=FitTrack, L=Lima, S=Lima, C=PE"

      - name: Zipalign APK
        run: |
          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          $ZIPALIGN -v -p 4 android/app/build/outputs/apk/debug/app-debug.apk FitTrack-aligned.apk

      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -1)
          $APKSIGNER sign --ks debug.keystore --ks-key-alias fittrack --ks-pass pass:fittrack123 --key-pass pass:fittrack123 --out FitTrack-v1.0.apk FitTrack-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: FitTrack-APK
          path: FitTrack-v1.0.apk
          retention-days: 30

      - name: Show APK info
        run: du -sh FitTrack-v1.0.apk
